name: Publish to PyPI

# Publishes on a version tag (e.g. `git tag v0.1.1 && git push --tags`).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored anywhere.
# One-time PyPI setup: pypi.org -> your project -> Publishing -> add a trusted
# publisher (or a "pending publisher" before the first release):
#   owner: cdcoonce   repo: graphmark   workflow: publish.yml   (leave environment blank)

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build
        run: uv build
      - name: Gate (ruff + tests) before publish
        run: |
          uv run --extra dev ruff check .
          uv run --extra dev ruff format --check .
          uv run --extra dev pytest -q
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
