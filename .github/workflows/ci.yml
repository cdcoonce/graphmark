name: CI

# Mirrors the afk gate exactly (see .afk/config.toml). The macOS leg exists because the afk
# executor gates on Linux only — OS-specific escapes must surface here, not at release time.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv run --extra dev ruff check .
      - name: Format check
        run: uv run --extra dev ruff format --check .
      - name: Tests
        run: uv run --extra dev pytest -q
